<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>图片记忆问卷</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      margin: 0;
      background: #f5f7fb;
      color: #1f2937;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
      padding: 24px;
    }
    h1 {
      margin-top: 0;
      font-size: 28px;
    }
    .muted {
      color: #6b7280;
      line-height: 1.7;
    }
    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 16px;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }
    button.secondary {
      background: #e5e7eb;
      color: #111827;
    }
    .center {
      text-align: center;
    }
    #stimulusView {
      display: none;
    }
    #questionView {
      display: none;
    }
    #resultView {
      display: none;
    }
    .image-box {
      text-align: center;
    }
    .image-box img {
      max-width: 100%;
      max-height: 78vh;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,.12);
    }
    .timer {
      margin-top: 12px;
      font-size: 18px;
      font-weight: 600;
    }
    .options {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }
    .option {
      display: block;
      padding: 14px 16px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      cursor: pointer;
      transition: .15s;
      background: #fff;
    }
    .option:hover {
      border-color: #2563eb;
      background: #eff6ff;
    }
    .option input {
      margin-right: 10px;
    }
    .result-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      line-height: 1.8;
      word-break: break-word;
    }
    .footer {
      margin-top: 18px;
      font-size: 13px;
      color: #6b7280;
    }
  </style>
</head>
<body>

    <div class="card" id="introView">

      <p class="muted">

      </p>

        <button onclick="startExperiment()">开始</button>

      </div>
    </div>

    <div class="card" id="questionView">
      <h1>请作答</h1>
      <form id="questionForm">
        <p id="questionText" style="font-size: 22px; line-height: 1.7;"></p>
        <div class="options">
          <label class="option"><input type="radio" name="answer" value="有！" />有！</label>
          <label class="option"><input type="radio" name="answer" value="好像有" />好像有</label>
          <label class="option"><input type="radio" name="answer" value="没有" />没有</label>
        </div>
        <div style="margin-top: 20px;">
          <button type="submit">提交</button>
        </div>
      </form>
    </div>

    <div class="card" id="resultView">
      <h1>已完成</h1>
      <div class="result-box" id="resultBox"></div>
      <div style="margin-top: 16px;">
        <button class="secondary" onclick="restart()">重新开始</button>
      </div>
      <div class="footer">
        说明：此页面为本地单文件问卷演示版，结果仅显示在当前页面，不会自动上传到在线数据库。
      </div>
    </div>
  </div>

  <script>
    let remaining = 30;
    let timer = null;
    let chosenQuestion = "";
    let startTime = null;

    const q1 = "你看到图片里桌子上放着的笔了吗？";
    const q2 = "你有没有看见桌子上好像有一根笔？";

    function show(id) {
      document.getElementById("introView").style.display = "none";
      document.getElementById("stimulusView").style.display = "none";
      document.getElementById("questionView").style.display = "none";
      document.getElementById("resultView").style.display = "none";
      document.getElementById(id).style.display = "block";
    }

    function startExperiment() {
      remaining = 30;
      startTime = new Date();
      document.getElementById("countdown").textContent = remaining;
      show("stimulusView");

      timer = setInterval(() => {
        remaining -= 1;
        document.getElementById("countdown").textContent = remaining;
        if (remaining <= 0) {
          clearInterval(timer);
          launchQuestion();
        }
      }, 1000);
    }

    function launchQuestion() {
      chosenQuestion = Math.random() < 0.5 ? q1 : q2;
      document.getElementById("questionText").textContent = chosenQuestion;
      document.getElementById("questionForm").reset();
      show("questionView");
    }

    document.getElementById("questionForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const picked = document.querySelector('input[name="answer"]:checked');
      if (!picked) {
        alert("请选择一个选项。");
        return;
      }

      const endTime = new Date();
      const resultHtml = `
        <strong>你的作答已记录在当前页面：</strong><br><br>
        <strong>展示图片时长：</strong>30 秒<br>
        <strong>出现的问题：</strong>${chosenQuestion}<br>
        <strong>你的回答：</strong>${picked.value}<br>
        <strong>开始时间：</strong>${startTime.toLocaleString()}<br>
        <strong>提交时间：</strong>${endTime.toLocaleString()}
      `;
      document.getElementById("resultBox").innerHTML = resultHtml;
      show("resultView");
    });

    function restart() {
      show("introView");
    }
  </script>
</body>
</html>
